#
# Cloudflare Pages — WebILP v2 (static app + Workers AI API)
#
# Project:  webilp
# Domain:   app.livelogic.dev
#
# Local dev (Workers AI + session limits):
#   npm run dev
#
# Deploy:
#   npm run deploy
#

name = "webilp"
pages_build_output_dir = "."
compatibility_date = "2024-09-23"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "SESSION_KV"
id = "568f080cc6e34b2ba1968ddb5ecf0111"
preview_id = "ead1fc6087744062bfe2282f4e82ebf9"

[vars]
SESSION_REQUEST_LIMIT = "30"
CF_AI_MODEL = "@cf/meta/llama-3.1-8b-instruct"
